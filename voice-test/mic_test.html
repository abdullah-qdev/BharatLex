<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BharatLex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;

      --ink:        #0A0D17;
      --ink-2:      #0E121F;
      --surface:    #141A2B;
      --surface-2:  #1B2236;
      --line:       #262E45;
      --line-soft:  #1C2336;

      --brass:        #C8A35B;
      --brass-bright: #E4C588;
      --brass-dim:    #7E6A43;

      --text:   #ECEAE3;
      --muted:  #8A90A6;
      --faint:  #5C627A;

      --danger: #E0625A;
      --ok:     #74C295;

      --serif: "Spectral", Georgia, serif;
      --sans:  "IBM Plex Sans", system-ui, sans-serif;
      --mono:  "IBM Plex Mono", ui-monospace, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(900px 600px at 50% 38%, rgba(200,163,91,0.10), transparent 60%),
        radial-gradient(1200px 900px at 50% 120%, rgba(27,34,54,0.6), transparent 70%),
        var(--ink);
      background-attachment: fixed;
    }

    /* ── Hero: the only thing centered in the viewport ───────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 48px 24px;
      text-align: center;
    }

    .brand { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .wordmark {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(40px, 7vw, 68px);
      letter-spacing: 0.01em;
      line-height: 1;
      margin: 0;
    }
    .wordmark b { font-weight: 600; color: var(--brass-bright); }
    .rule {
      width: 72px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--brass), transparent);
    }
    .tagline {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      max-width: 30ch;
      line-height: 1.5;
    }

    /* ── Controls ────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .btn {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 13px 24px;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease,
                  transform .12s ease, color .18s ease, box-shadow .18s ease;
      position: relative;
    }
    .btn:hover:not(:disabled) { border-color: var(--brass-dim); background: var(--surface-2); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:focus-visible { outline: 2px solid var(--brass); outline-offset: 3px; }
    .btn:disabled { opacity: 0.32; cursor: not-allowed; }

    /* Primary "Analyze" — the brass seal */
    .btn--primary {
      color: #1A140A;
      background: linear-gradient(180deg, var(--brass-bright), var(--brass));
      border: 1px solid var(--brass-bright);
      font-weight: 600;
      box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset,
                  0 10px 30px -10px rgba(200,163,91,0.5);
    }
    .btn--primary:hover:not(:disabled) {
      background: linear-gradient(180deg, #EFD49B, var(--brass-bright));
      box-shadow: 0 1px 0 rgba(255,255,255,0.3) inset,
                  0 14px 36px -10px rgba(200,163,91,0.6);
    }

    /* Recording state */
    .btn--record.is-live {
      color: var(--danger);
      border-color: rgba(224,98,90,0.55);
      background: rgba(224,98,90,0.08);
    }
    .btn--record.is-live::after {
      content: "";
      position: absolute; inset: -1px;
      border-radius: 999px;
      border: 1px solid var(--danger);
      animation: pulse 1.6s ease-out infinite;
    }
    @keyframes pulse {
      0%   { opacity: .7; transform: scale(1); }
      100% { opacity: 0;  transform: scale(1.18); }
    }

    /* ── Status readout ──────────────────────────────────────────────── */
    .status {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.02em;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 16px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 0 transparent;
    }
    .status[data-state="live"]  .dot { background: var(--danger); box-shadow: 0 0 10px 1px rgba(224,98,90,.7); }
    .status[data-state="busy"]  .dot { background: var(--brass); box-shadow: 0 0 10px 1px rgba(200,163,91,.6); }
    .status[data-state="ok"]    .dot { background: var(--ok); box-shadow: 0 0 10px 1px rgba(116,194,149,.6); }
    .status[data-state="error"] .dot { background: var(--danger); }
    .status[data-state="error"] { color: var(--danger); }

    /* ── Output section ──────────────────────────────────────────────── */
    .output {
      max-width: 720px;
      margin: 0 auto 96px;
      padding: 0 24px;
    }
    .ruling {
      background: linear-gradient(180deg, var(--surface), var(--ink-2));
      border: 1px solid var(--line);
      border-top: 2px solid var(--brass);
      border-radius: 16px;
      padding: 28px 30px 30px;
    }
    .ruling.is-empty {
      border-top-color: var(--line);
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 40px 30px;
    }
    .ruling__eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brass);
      margin: 0 0 18px;
    }
    .ruling__section + .ruling__section { margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--line-soft); }
    .ruling__section h4 {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .ruling__text {
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.6;
      color: var(--text);
      margin: 0;
    }
    .ruling dl { margin: 0; display: grid; grid-template-columns: max-content 1fr; gap: 6px 18px; }
    .ruling dt { font-family: var(--mono); font-size: 12px; color: var(--brass); align-self: baseline; }
    .ruling dd { margin: 0; font-size: 15px; line-height: 1.55; color: var(--text); }
    .ruling ul { margin: 0; padding-left: 18px; }
    .ruling li { font-size: 15px; line-height: 1.6; margin: 2px 0; }

    .reveal { animation: rise .5s cubic-bezier(.2,.7,.2,1); }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    @media (prefers-reduced-motion: reduce) {
      *, ::after, ::before { animation: none !important; transition: none !important; }
    }
    @media (max-width: 520px) {
      .controls { flex-direction: column; width: 100%; max-width: 320px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="brand">
      <h1 class="wordmark">Bharat<b>Lex</b></h1>
      <div class="rule"></div>
      <p class="tagline">Record testimony or upload a document, then run the analysis.</p>
    </div>

    <div class="controls">
      <button id="recordBtn" class="btn btn--record">Start recording</button>
      <button id="uploadBtn" class="btn">Upload document</button>
      <button id="submitBtn" class="btn btn--primary" disabled>Analyze</button>
      <button id="resetBtn" class="btn">Clear</button>
      <input type="file" id="fileInput"
             accept="image/*,.pdf,.txt,.png,.jpg,.jpeg,.webp,.tiff,.bmp"
             hidden />
    </div>

    <div class="status" id="status" data-state="idle">
      <span class="dot"></span><span id="statusText">Idle</span>
    </div>
  </section>

  <section class="output" id="output">
    <div class="ruling is-empty" id="ruling">
      No analysis yet. Capture audio or upload a document, then press Analyze.
    </div>
  </section>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const API_BASE          = "http://127.0.0.1:8000";
const ANALYZE_AUDIO_URL = API_BASE + "/analyze-audio";   // audio  -> STT + analysis
const OCR_URL           = API_BASE + "/ocr";             // file/image -> ocr_normalized.py -> txt
const ANALYZE_TEXT_URL  = API_BASE + "/analyze-text";    // txt -> analysis
//
// NOTE: the browser can't run ../backend/ocr/ocr_normalized.py directly. Expose it
// as a FastAPI route (OCR_URL) that accepts the file, runs the script, and returns
// JSON: { text: "..." }.

// ─── State ────────────────────────────────────────────────────────────────────
let recorder, micStream, chunks = [];
let timerInterval, recSeconds = 0;
let rawBlob = null, ocrText = null;
let activeInput = null;        // 'audio' | 'file'
let isRecording = false, recordingUsed = false;

// ─── Console-only diagnostics ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const STYLE = "color:#C8A35B";
function clog(msg, level = "info") {
  const tag = "%c[BharatLex] " + msg;
  if (level === "error") console.error(tag, STYLE);
  else if (level === "warn") console.warn(tag, STYLE);
  else console.log(tag, STYLE);
}
function stage(name, state) { clog("stage · " + name + " → " + state, state === "error" ? "error" : "info"); }

// ─── Status pill ──────────────────────────────────────────────────────────────
function setStatus(text, state = "idle") {
  $("statusText").textContent = text;
  $("status").dataset.state = state;
}
function setError(msg) {
  setStatus(msg.length > 60 ? msg.slice(0, 57) + "…" : msg, "error");
  clog(msg, "error");
}

function updateSubmitState() {
  $("submitBtn").disabled =
    !(activeInput === "audio" && rawBlob) && !(activeInput === "file" && ocrText);
}

// ─── Output rendering (the only on-page result surface) ───────────────────────
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function renderValue(v) {
  if (v == null || v === "") return "";
  if (Array.isArray(v))
    return "<ul>" + v.map(i => "<li>" + esc(typeof i === "object" ? JSON.stringify(i) : i) + "</li>").join("") + "</ul>";
  if (typeof v === "object")
    return "<dl>" + Object.entries(v).map(([k, val]) =>
      "<dt>" + esc(k) + "</dt><dd>" + (typeof val === "object" ? esc(JSON.stringify(val)) : esc(val)) + "</dd>"
    ).join("") + "</dl>";
  return '<p class="ruling__text">' + esc(v) + "</p>";
}
function section(title, value) {
  const inner = renderValue(value);
  if (!inner) return "";
  return '<div class="ruling__section"><h4>' + esc(title) + "</h4>" + inner + "</div>";
}

function showResults(d, transcriptFallback) {
  const transcript = d.transcript ?? d.text ?? transcriptFallback ?? "";
  // Transcript + raw payload stay in the console, per design.
  console.groupCollapsed("%c[BharatLex] result", STYLE);
  clog("transcript: " + (transcript || "(none)"));
  if (d.language_code || d.detected_language) clog("language: " + (d.language_code ?? d.detected_language));
  console.log(d);
  console.groupEnd();

  let html = "";
  if (d.category) html += '<p class="ruling__eyebrow">Analysis · ' + esc(d.category) + "</p>";
  else            html += '<p class="ruling__eyebrow">Analysis</p>';
  html += section("Findings", d.analysis);
  html += section("Opposing position", d.opponent);
  if (!d.analysis && !d.opponent) html += section("Result", d);

  const ruling = $("ruling");
  ruling.className = "ruling reveal";
  ruling.innerHTML = html;
  $("output").scrollIntoView({ behavior: "smooth", block: "center" });
}

function clearOutput() {
  const ruling = $("ruling");
  ruling.className = "ruling is-empty";
  ruling.textContent = "No analysis yet. Capture audio or upload a document, then press Analyze.";
}

// ─── OGG conversion (audio path) ──────────────────────────────────────────────
async function convertToOGG(blob) {
  clog("input: " + blob.type + " (" + blob.size + " bytes)");
  const header = await blob.slice(0, 4).arrayBuffer();
  const magic = Array.from(new Uint8Array(header)).map(b => b.toString(16).padStart(2, "0")).join(" ");
  clog("container magic: " + magic);
  if (magic === "4f 67 67 53") { clog("already OGG — pass through"); return new Blob([await blob.arrayBuffer()], { type: "audio/ogg" }); }
  if (magic === "1a 45 df a3") { clog("WebM — relabel as audio/ogg (Opus payload unchanged)", "warn"); return new Blob([await blob.arrayBuffer()], { type: "audio/ogg" }); }
  clog("unknown magic — relabel as audio/ogg anyway", "warn");
  return new Blob([await blob.arrayBuffer()], { type: "audio/ogg" });
}

// ─── Start / Stop (one-shot recording) ────────────────────────────────────────
$("recordBtn").onclick = () => (isRecording ? stopRecording() : startRecording());

async function startRecording() {
  chunks = [];
  stage("mic", "active");
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: { ideal: 16000 },
               echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    const track = micStream.getAudioTracks()[0];
    clog("mic granted: " + track.label);

    const types = ["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/ogg"];
    const mimeType = types.find(t => MediaRecorder.isTypeSupported(t)) || "";
    clog("mimeType: " + (mimeType || "(default)"));

    recorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.start(200);

    recSeconds = 0;
    timerInterval = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds/60)).padStart(1,"0");
      const s = String(recSeconds%60).padStart(2,"0");
      setStatus("Recording " + m + ":" + s, "live");
    }, 1000);

    isRecording = true;
    setStatus("Recording 0:00", "live");
    $("recordBtn").textContent = "Stop recording";
    $("recordBtn").classList.add("is-live");
    $("submitBtn").disabled = true;
    $("uploadBtn").disabled = true;
    stage("mic", "done");
  } catch (err) {
    stage("mic", "error");
    setError("Mic error — " + err.name);
  }
}

async function stopRecording() {
  clearInterval(timerInterval);
  setStatus("Finishing…", "busy");
  await new Promise(res => { recorder.onstop = res; recorder.stop(); });
  micStream.getTracks().forEach(t => t.stop());

  rawBlob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
  clog("raw blob: " + rawBlob.type + ", " + rawBlob.size + " bytes");

  isRecording = false; recordingUsed = true;
  $("recordBtn").classList.remove("is-live");
  $("recordBtn").textContent = "Recorded";
  $("recordBtn").disabled = true;       // one-shot: no restart until Clear
  $("uploadBtn").disabled = false;

  if (rawBlob.size < 1000) { stage("blob","error"); setError("Recording too short — press Clear and retry"); return; }
  stage("blob", "done");

  activeInput = "audio";
  setStatus("Ready to analyze · audio", "ok");
  updateSubmitState();
}

// ─── Upload → OCR ─────────────────────────────────────────────────────────────
$("uploadBtn").onclick = () => $("fileInput").click();

$("fileInput").onchange = async () => {
  const file = $("fileInput").files[0];
  if (!file) return;
  clog("file: " + file.name + " (" + file.type + ", " + file.size + " bytes)");
  stage("file", "done");
  stage("ocr", "active");
  setStatus("Reading document…", "busy");
  $("submitBtn").disabled = true;

  const fd = new FormData();
  fd.append("file", file, file.name);

  let res, text;
  try {
    res = await fetch(OCR_URL, { method: "POST", body: fd });
    text = await res.text();
    clog("OCR HTTP " + res.status + " — " + text.slice(0, 400), res.ok ? "info" : "error");
  } catch (err) { stage("ocr","error"); setError("OCR unreachable — is " + OCR_URL + " running?"); return; }

  if (!res.ok) { stage("ocr","error"); setError("OCR failed (" + res.status + ")"); return; }

  let parsed; try { parsed = JSON.parse(text); }
  catch { stage("ocr","error"); setError("OCR returned non-JSON"); return; }

  const od = parsed.data ?? parsed;
  ocrText = od.text ?? od.transcript ?? od.ocr_text ?? "";
  if (!ocrText.trim()) { stage("ocr","error"); setError("OCR returned empty text"); return; }

  stage("ocr", "done");
  clog("OCR text (" + ocrText.length + " chars):\n" + ocrText);

  activeInput = "file";
  setStatus("Ready to analyze · document", "ok");
  updateSubmitState();
};

// ─── Analyze ──────────────────────────────────────────────────────────────────
$("submitBtn").onclick = async () => {
  $("submitBtn").disabled = true;
  if (activeInput === "audio") await submitAudio();
  else if (activeInput === "file") await submitText();
  else setError("Nothing to analyze yet");
};

async function submitAudio() {
  setStatus("Preparing audio…", "busy");
  let ogg;
  try { ogg = await convertToOGG(rawBlob); stage("ogg","done"); }
  catch (err) { stage("ogg","error"); setError("Audio prep failed"); updateSubmitState(); return; }

  setStatus("Analyzing…", "busy");
  stage("upload", "active");
  const fd = new FormData();
  fd.append("file", ogg, "recording.ogg");

  let res, text;
  try { res = await fetch(ANALYZE_AUDIO_URL, { method:"POST", body: fd }); text = await res.text();
        clog("HTTP " + res.status + " — " + text.slice(0,400), res.ok?"info":"error"); }
  catch (err) { stage("upload","error"); setError("Backend unreachable — check CORS"); updateSubmitState(); return; }

  if (!res.ok) { stage("upload","error"); setError("Backend " + res.status); updateSubmitState(); return; }
  stage("upload","done");

  let data; try { data = JSON.parse(text); }
  catch { stage("stt","error"); setError("Response not JSON"); updateSubmitState(); return; }

  showResults(data.data ?? data);
  stage("stt","done");
  setStatus("Complete", "ok");
}

async function submitText() {
  setStatus("Analyzing…", "busy");
  stage("analyze", "active");
  let res, text;
  try {
    res = await fetch(ANALYZE_TEXT_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ text: ocrText })
    });
    text = await res.text();
    clog("HTTP " + res.status + " — " + text.slice(0,400), res.ok?"info":"error");
  } catch (err) { stage("analyze","error"); setError("Backend unreachable — check " + ANALYZE_TEXT_URL); updateSubmitState(); return; }

  if (!res.ok) { stage("analyze","error"); setError("Backend " + res.status); updateSubmitState(); return; }

  let data; try { data = JSON.parse(text); }
  catch { stage("analyze","error"); setError("Response not JSON"); updateSubmitState(); return; }

  showResults(data.data ?? data, ocrText);
  stage("analyze","done");
  setStatus("Complete", "ok");
}

// ─── Clear ────────────────────────────────────────────────────────────────────
$("resetBtn").onclick = () => {
  if (recorder && recorder.state === "recording") {
    recorder.stop();
    if (micStream) micStream.getTracks().forEach(t => t.stop());
  }
  clearInterval(timerInterval);
  recSeconds = 0; chunks = [];
  rawBlob = null; ocrText = null; activeInput = null;
  isRecording = false; recordingUsed = false;

  $("recordBtn").disabled = false;
  $("recordBtn").classList.remove("is-live");
  $("recordBtn").textContent = "Start recording";
  $("uploadBtn").disabled = false;
  $("submitBtn").disabled = true;
  $("fileInput").value = "";

  clearOutput();
  setStatus("Idle", "idle");
  console.clear();
  clog("cleared");
};
</script>
</body>
</html>
