<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BharatLex</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      color-scheme: dark;

      --ink:        #0A0D17;
      --ink-2:      #0E121F;
      --surface:    #141A2B;
      --surface-2:  #1B2236;
      --line:       #262E45;
      --line-soft:  #1C2336;

      --brass:        #C8A35B;
      --brass-bright: #E4C588;
      --brass-dim:    #7E6A43;

      --text:   #ECEAE3;
      --muted:  #8A90A6;
      --faint:  #5C627A;

      --danger: #E0625A;
      --ok:     #74C295;

      --serif: "Spectral", Georgia, serif;
      --sans:  "IBM Plex Sans", system-ui, sans-serif;
      --mono:  "IBM Plex Mono", ui-monospace, monospace;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: var(--sans);
      color: var(--text);
      background:
        radial-gradient(900px 600px at 50% 38%, rgba(200,163,91,0.10), transparent 60%),
        radial-gradient(1200px 900px at 50% 120%, rgba(27,34,54,0.6), transparent 70%),
        var(--ink);
      background-attachment: fixed;
    }

    /* ── Hero: the only thing centered in the viewport ───────────────── */
    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
      padding: 48px 24px;
      text-align: center;
    }

    .brand { display: flex; flex-direction: column; align-items: center; gap: 14px; }
    .wordmark {
      font-family: var(--serif);
      font-weight: 500;
      font-size: clamp(40px, 7vw, 68px);
      letter-spacing: 0.01em;
      line-height: 1;
      margin: 0;
    }
    .wordmark b { font-weight: 600; color: var(--brass-bright); }
    .rule {
      width: 72px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--brass), transparent);
    }
    .tagline {
      margin: 0;
      font-size: 14px;
      color: var(--muted);
      max-width: 30ch;
      line-height: 1.5;
    }

    /* ── Controls ────────────────────────────────────────────────────── */
    .controls {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
      align-items: center;
    }

    .btn {
      font-family: var(--sans);
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.01em;
      color: var(--text);
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 13px 24px;
      cursor: pointer;
      transition: border-color .18s ease, background .18s ease,
                  transform .12s ease, color .18s ease, box-shadow .18s ease;
      position: relative;
    }
    .btn:hover:not(:disabled) { border-color: var(--brass-dim); background: var(--surface-2); }
    .btn:active:not(:disabled) { transform: translateY(1px); }
    .btn:focus-visible { outline: 2px solid var(--brass); outline-offset: 3px; }
    .btn:disabled { opacity: 0.32; cursor: not-allowed; }

    /* Primary "Analyze" — the brass seal */
    .btn--primary {
      color: #1A140A;
      background: linear-gradient(180deg, var(--brass-bright), var(--brass));
      border: 1px solid var(--brass-bright);
      font-weight: 600;
      box-shadow: 0 1px 0 rgba(255,255,255,0.25) inset,
                  0 10px 30px -10px rgba(200,163,91,0.5);
    }
    .btn--primary:hover:not(:disabled) {
      background: linear-gradient(180deg, #EFD49B, var(--brass-bright));
      box-shadow: 0 1px 0 rgba(255,255,255,0.3) inset,
                  0 14px 36px -10px rgba(200,163,91,0.6);
    }

    /* Recording state */
    .btn--record.is-live {
      color: var(--danger);
      border-color: rgba(224,98,90,0.55);
      background: rgba(224,98,90,0.08);
    }
    .btn--record.is-live::after {
      content: "";
      position: absolute; inset: -1px;
      border-radius: 999px;
      border: 1px solid var(--danger);
      animation: pulse 1.6s ease-out infinite;
    }
    @keyframes pulse {
      0%   { opacity: .7; transform: scale(1); }
      100% { opacity: 0;  transform: scale(1.18); }
    }

    /* ── Status readout ──────────────────────────────────────────────── */
    .status {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.02em;
      color: var(--muted);
      display: inline-flex;
      align-items: center;
      gap: 9px;
      min-height: 16px;
    }
    .dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: var(--muted);
      box-shadow: 0 0 0 0 transparent;
    }
    .status[data-state="live"]  .dot { background: var(--danger); box-shadow: 0 0 10px 1px rgba(224,98,90,.7); }
    .status[data-state="busy"]  .dot { background: var(--brass); box-shadow: 0 0 10px 1px rgba(200,163,91,.6); }
    .status[data-state="ok"]    .dot { background: var(--ok); box-shadow: 0 0 10px 1px rgba(116,194,149,.6); }
    .status[data-state="error"] .dot { background: var(--danger); }
    .status[data-state="error"] { color: var(--danger); }

    /* ── Output section ──────────────────────────────────────────────── */
    .output {
      max-width: min(1120px, calc(100vw - 48px));
      margin: 0 auto 96px;
      padding: 0 24px;
    }
    .ruling {
      background: linear-gradient(180deg, var(--surface), var(--ink-2));
      border: 1px solid var(--line);
      border-top: 2px solid var(--brass);
      border-radius: 16px;
      padding: 28px 30px 30px;
      overflow: hidden;
      overflow-wrap: anywhere;
    }
    .ruling.is-empty {
      border-top-color: var(--line);
      text-align: center;
      color: var(--muted);
      font-size: 14px;
      padding: 40px 30px;
    }
    .ruling__eyebrow {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--brass);
      margin: 0 0 18px;
    }
    .ruling__section + .ruling__section { margin-top: 22px; padding-top: 22px; border-top: 1px solid var(--line-soft); }
    .ruling__section h4 {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin: 0 0 10px;
    }
    .ruling__text {
      font-family: var(--serif);
      font-size: 17px;
      line-height: 1.6;
      color: var(--text);
      margin: 0;
    }
    .ruling__text + .ruling__text { margin-top: 12px; }
    .ruling__heading {
      font-family: var(--serif);
      font-size: 18px;
      font-weight: 600;
      color: var(--brass-bright);
      margin: 18px 0 8px;
    }
    .ruling__heading:first-child { margin-top: 0; }
    .ruling__list { margin: 8px 0 0; padding-left: 20px; }
    .ruling__list li { margin: 6px 0; }
    .ruling dl { margin: 0; display: grid; grid-template-columns: minmax(92px, max-content) minmax(0, 1fr); gap: 6px 18px; }
    .ruling dt { font-family: var(--mono); font-size: 12px; color: var(--brass); align-self: baseline; }
    .ruling dd { margin: 0; font-size: 15px; line-height: 1.55; color: var(--text); min-width: 0; }
    .ruling ul { margin: 0; padding-left: 18px; }
    .ruling li { font-size: 15px; line-height: 1.6; margin: 2px 0; }
    .debate { display: grid; gap: 16px; }
    .debate__round {
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      overflow: hidden;
      background: rgba(10, 13, 23, 0.28);
    }
    .debate__round-title {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brass);
      padding: 10px 14px;
      border-bottom: 1px solid var(--line-soft);
      background: rgba(200,163,91,0.06);
    }
    .debate__turn { padding: 14px; }
    .debate__turn + .debate__turn { border-top: 1px solid var(--line-soft); }
    .debate__agent {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--brass-bright);
      margin-bottom: 8px;
    }
    .debate__role {
      color: var(--muted);
      font-family: var(--sans);
      font-size: 12px;
      margin-left: 6px;
    }
    .input-preview {
      margin-top: 18px;
      border: 1px solid var(--line-soft);
      border-radius: 12px;
      padding: 14px;
      background: rgba(10, 13, 23, 0.34);
    }
    .input-preview__label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--brass);
      margin-bottom: 8px;
    }
    .input-preview__text {
      font-family: var(--sans);
      font-size: 14px;
      line-height: 1.55;
      color: var(--text);
      max-height: 150px;
      overflow: auto;
      white-space: pre-wrap;
    }
    .draft-callout {
      border: 1px solid rgba(200,163,91,0.35);
      border-radius: 12px;
      padding: 14px;
      background: rgba(200,163,91,0.07);
    }
    .draft-editor {
      width: 100%;
      min-height: 360px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      color: var(--text);
      background: rgba(10, 13, 23, 0.55);
      font-family: var(--serif);
      font-size: 15px;
      line-height: 1.55;
      white-space: pre-wrap;
    }
    .draft-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 12px;
    }

    .reveal { animation: rise .5s cubic-bezier(.2,.7,.2,1); }
    @keyframes rise { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }

    @media (prefers-reduced-motion: reduce) {
      *, ::after, ::before { animation: none !important; transition: none !important; }
    }
    @media (max-width: 520px) {
      .controls { flex-direction: column; width: 100%; max-width: 320px; }
      .btn { width: 100%; }
    }
  </style>
</head>
<body>

  <section class="hero">
    <div class="brand">
      <h1 class="wordmark">Bharat<b>Lex</b></h1>
      <div class="rule"></div>
      <p class="tagline">Record testimony or upload a document, then run the analysis.</p>
    </div>

    <div class="controls">
      <button id="recordBtn" class="btn btn--record">Start recording</button>
      <button id="uploadBtn" class="btn">Upload document</button>
      <button id="submitBtn" class="btn btn--primary" disabled>Analyze</button>
      <button id="resetBtn" class="btn">Clear</button>
      <input type="file" id="fileInput"
             accept="image/*,.txt,.png,.jpg,.jpeg,.webp,.tiff,.bmp"
             hidden />
    </div>

    <div class="status" id="status" data-state="idle">
      <span class="dot"></span><span id="statusText">Idle</span>
    </div>
  </section>

  <section class="output" id="output">
    <div class="ruling is-empty" id="ruling">
      No analysis yet. Capture audio or upload a document, then press Analyze.
    </div>
  </section>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const API_BASE          = new URLSearchParams(location.search).get("api") || "http://127.0.0.1:8012";
const ANALYZE_AUDIO_URL = API_BASE + "/api/speech/ask?include_final=true&debug=false&save_conversation=false";
const OCR_URL           = API_BASE + "/api/ocr/image?lang=eng%2Bhin";
const ANALYZE_TEXT_URL  = API_BASE + "/api/rag/ask";
// To test another backend port, open mic_test.html?api=http://127.0.0.1:8012

// ─── State ────────────────────────────────────────────────────────────────────
let recorder, micStream, chunks = [];
let timerInterval, recSeconds = 0;
let rawBlob = null, ocrText = null;
let activeInput = null;        // 'audio' | 'file'
let isRecording = false, recordingUsed = false;
let capturedInput = null;

// ─── Console-only diagnostics ─────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const STYLE = "color:#C8A35B";
function clog(msg, level = "info") {
  const tag = "%c[BharatLex] " + msg;
  if (level === "error") console.error(tag, STYLE);
  else if (level === "warn") console.warn(tag, STYLE);
  else console.log(tag, STYLE);
}
function stage(name, state) { clog("stage · " + name + " → " + state, state === "error" ? "error" : "info"); }

// ─── Status pill ──────────────────────────────────────────────────────────────
function setStatus(text, state = "idle") {
  $("statusText").textContent = text;
  $("status").dataset.state = state;
}
function setError(msg) {
  setStatus(msg.length > 60 ? msg.slice(0, 57) + "…" : msg, "error");
  clog(msg, "error");
}

function updateSubmitState() {
  $("submitBtn").disabled =
    !(activeInput === "audio" && rawBlob) && !(activeInput === "file" && ocrText);
}

// ─── Output rendering (the only on-page result surface) ───────────────────────
function esc(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[c]));
}
function cleanMarkdown(s) {
  return String(s)
    .replace(/\*\*(.*?)\*\*/g, "$1")
    .replace(/^\s*#{1,6}\s*/gm, "")
    .trim();
}
function renderTextBlock(text) {
  const lines = cleanMarkdown(text).split(/\r?\n/);
  let html = "";
  let listOpen = false;

  const closeList = () => {
    if (listOpen) {
      html += "</ul>";
      listOpen = false;
    }
  };

  for (const rawLine of lines) {
    const line = rawLine.trim();
    if (!line) {
      closeList();
      continue;
    }

    const heading = line.match(/^([^:]{2,48}):$/);
    if (heading) {
      closeList();
      html += '<h5 class="ruling__heading">' + esc(heading[1]) + "</h5>";
      continue;
    }

    const numbered = line.match(/^\d+[\.)]\s+(.*)$/);
    const bullet = line.match(/^[-*]\s+(.*)$/);
    if (numbered || bullet) {
      if (!listOpen) {
        html += '<ul class="ruling__list">';
        listOpen = true;
      }
      html += "<li>" + esc(numbered?.[1] ?? bullet?.[1]) + "</li>";
      continue;
    }

    closeList();
    html += '<p class="ruling__text">' + esc(line) + "</p>";
  }

  closeList();
  return html;
}
function renderObject(v) {
  return "<dl>" + Object.entries(v).map(([k, val]) =>
    "<dt>" + esc(k.replace(/_/g, " ")) + "</dt><dd>" + renderValue(val) + "</dd>"
  ).join("") + "</dl>";
}
function renderValue(v) {
  if (v == null || v === "") return "";
  if (Array.isArray(v))
    return '<ul class="ruling__list">' + v.map(i => "<li>" + (typeof i === "object" ? renderValue(i) : esc(i)) + "</li>").join("") + "</ul>";
  if (typeof v === "object")
    return renderObject(v);
  return renderTextBlock(v);
}
function section(title, value) {
  const inner = renderValue(value);
  if (!inner) return "";
  return '<div class="ruling__section"><h4>' + esc(title) + "</h4>" + inner + "</div>";
}
function showWorking(title, text) {
  const ruling = $("ruling");
  ruling.className = "ruling reveal";
  ruling.innerHTML =
    '<p class="ruling__eyebrow">' + esc(title) + '</p>' +
    '<div class="input-preview">' +
      '<div class="input-preview__label">Captured input</div>' +
      '<div class="input-preview__text">' + esc(text || "Waiting for extracted text...") + '</div>' +
    '</div>';
}
function inputSection(d, fallback) {
  const source = d.input_source ?? {};
  const text = source.ocr_text || source.transcript || capturedInput?.text || fallback;
  if (!text) return "";
  const label = source.type === "speech" ? "Speech transcript" :
    source.type === "ocr_image" ? "OCR extracted text" :
    capturedInput?.label || "Captured input";
  return '<div class="ruling__section"><h4>' + esc(label) + '</h4>' +
    '<div class="input-preview"><div class="input-preview__text">' + esc(text) + '</div></div></div>';
}
function draftRecommendation(d) {
  const haystack = [
    d.question,
    d.final_answer,
    d.category?.label,
    d.category?.key,
    capturedInput?.text,
  ].filter(Boolean).join(" ").toLowerCase();

  const items = [];
  if (/sexual harassment|posh|harass|molest|inappropriate|assault/.test(haystack)) {
    items.push("Draft a POSH written complaint to the Internal Committee with incident dates, accused person, witnesses, screenshots/messages, and requested interim protection.");
  }
  if (/terminat|fired|dismiss|severance|salary|wages|notice period/.test(haystack)) {
    items.push("Draft an employment demand notice asking for written termination reasons, unpaid salary/severance, relieving documents, and a response deadline.");
  }
  if (/fraud|scam|otp|upi|bank|unauthori|transaction/.test(haystack)) {
    items.push("Draft a cyber/banking complaint summary with transaction IDs, dates, amounts, bank/app name, screenshots, and acknowledgement numbers.");
  }
  if (/refund|replacement|defect|seller|shop|consumer|delivery/.test(haystack)) {
    items.push("Draft a consumer complaint/legal notice with invoice details, seller name/address, defect proof, and the exact remedy requested.");
  }
  if (d.notice_readiness?.questions?.length) {
    items.push("Before drafting, collect: " + d.notice_readiness.questions.join(" "));
  }

  if (!items.length) return "";
  return '<div class="ruling__section"><h4>Drafting next</h4><div class="draft-callout">' +
    renderValue(items) +
    '</div></div>';
}
function makeDraftDocument(d) {
  const text = [
    d.question,
    d.final_answer,
    d.category?.label,
    d.category?.key,
    capturedInput?.text,
  ].filter(Boolean).join(" ").toLowerCase();
  const facts = capturedInput?.text || d.question || "[Describe the facts in chronological order]";
  const today = new Date().toLocaleDateString("en-IN");

  let title = "";
  let body = "";
  if (/sexual harassment|posh|harass|molest|inappropriate|assault/.test(text)) {
    title = "POSH Written Complaint";
    body = `FORMAL DRAFT: POSH WRITTEN COMPLAINT

Date: ${today}

To,
The Internal Committee / Presiding Officer
[Name of Organisation]
[Office Address]
[Official IC/HR Email]

CC:
[HR Head / Reporting Manager, if safe]
[Personal email copy for record]

Subject: Complaint of sexual harassment at workplace under the POSH Act, 2013

Complainant: [Your full name, designation, department, contact]
Respondent: [Name/designation of person complained against]
Workplace: [Office/branch/location]
City/State: [Your city/state]

Respected Sir/Madam,

I am submitting this written complaint regarding sexual harassment at the workplace. The relevant facts are stated below.

Facts and chronology:
${facts}

Evidence available:
- [Screenshots/messages/emails/call logs]
- [Witness names, if any]
- [Dates/times/locations of incidents]

Relief requested:
- Inquiry by the Internal Committee
- Interim protection from retaliation/contact, if required
- Preservation of CCTV/messages/emails/records
- Written acknowledgement of this complaint
- Details of the next hearing/procedure and point of contact

Declaration:
The above facts are true to the best of my knowledge.

Enclosures:
1. [Evidence file name]
2. [Identity/employment proof, if needed]

Signature:
[Your name]`;
  } else if (/terminat|fired|dismiss|severance|salary|wages|notice period/.test(text)) {
    title = "Employment Demand Notice";
    body = `FORMAL DRAFT: EMPLOYMENT DEMAND NOTICE

Date: ${today}

To,
[Employer/HR/Company Name]
[Company Address]
[HR/Legal Email]

CC:
[Reporting Manager]
[Personal email copy for record]

Subject: Demand for written reasons, pending dues, and employment records

Employee: [Your full name, employee ID, designation]
Employer: [Company name]
Employment period: [Joining date to termination date]
City/State: [Work location]

Respected Sir/Madam,

This is a formal request for written clarification and settlement of pending employment dues/records.

Facts and chronology:
${facts}

Demands:
- Written reasons/order for termination
- Pending salary, severance, notice pay, incentives, or other dues
- Relieving letter, experience letter, and final settlement statement
- Copies of employment contract, policies, attendance, and appraisal records

Please respond in writing within [7/15] days.

If there is no response, I may approach the appropriate labour authority/forum as applicable.

Enclosures:
1. [Offer letter/appointment letter]
2. [Salary slips/bank statement]
3. [Termination message/email]

Signature:
[Your name]`;
  } else if (/fraud|scam|otp|upi|bank|unauthori|transaction/.test(text)) {
    title = "Cyber/Banking Complaint Summary";
    body = `FORMAL DRAFT: CYBER / BANKING COMPLAINT SUMMARY

Date: ${today}

To,
Cyber Crime Cell / Bank Grievance Officer
[City/State]
[Police station/cyber cell email or bank grievance email]

Reference:
[1930 complaint acknowledgement number, if any]
[cybercrime.gov.in complaint ID, if any]

Subject: Complaint regarding cyber/financial fraud

Complainant: [Your full name, mobile, email, address]
Bank/Wallet/App: [Name]

Facts and chronology:
${facts}

Transaction details:
- Date/time:
- Amount:
- UPI ID/account/card/wallet:
- Transaction/reference ID:
- Suspect phone/email/URL/account:

Action requested:
- Freeze/reverse fraudulent transaction where possible
- Register complaint and provide acknowledgement
- Preserve logs, KYC, beneficiary account details, and transaction trail

Enclosures:
1. [Transaction screenshot]
2. [Bank statement]
3. [Messages/call logs/URLs]

Signature:
[Your name]`;
  } else if (/refund|replacement|defect|seller|shop|consumer|delivery/.test(text)) {
    title = "Consumer Complaint / Legal Notice";
    body = `FORMAL DRAFT: CONSUMER COMPLAINT / LEGAL NOTICE

Date: ${today}

To,
[Seller/Service Provider Name]
[Address / Email]
[Customer support / grievance email]

Subject: Notice regarding defective goods / deficient service

Consumer: [Your full name, phone, email, address]
Opposite Party: [Seller/company/platform]
Product/Service: [Details]
Invoice/Order No.: [Details]
City/State: [Your city/state]

Sir/Madam,

This notice is being sent regarding the defective goods/deficient service described below.

Facts and chronology:
${facts}

Relief requested:
- Refund / replacement / repair / compensation
- Written response within [7/15] days
- Preservation of invoice, warranty, service, and communication records

If not resolved, I may proceed before the appropriate consumer forum as per law.

Enclosures:
1. [Invoice/order receipt]
2. [Photos/videos of defect]
3. [Warranty/service records]
4. [Prior chats/emails]

Signature:
[Your name]`;
  }

  if (!title) return "";
  return '<div class="ruling__section"><h4>Formal draft document</h4>' +
    '<textarea id="draftText" class="draft-editor">' + esc(body) + '</textarea>' +
    '<div class="draft-actions">' +
      '<button class="btn" onclick="copyDraft()">Copy draft</button>' +
      '<button class="btn btn--primary" onclick="downloadDraft()">' + esc("Download " + title) + '</button>' +
    '</div></div>';
}
function officialReferences(d) {
  const text = [
    d.question,
    d.final_answer,
    d.category?.label,
    d.category?.key,
    capturedInput?.text,
  ].filter(Boolean).join(" ").toLowerCase();
  const refs = [];

  if (/sexual harassment|posh|harass|molest|inappropriate|assault|threat|unsafe/.test(text)) {
    refs.push("Emergency safety: dial 112 or use the 112 India app.");
    refs.push("Workplace sexual harassment: file a written complaint with the organisation's Internal Committee. If there is immediate danger, contact local police/emergency services first.");
    refs.push("If you share city/state, add local Women Police Cell / State Women Commission contact details.");
  }
  if (/fraud|scam|otp|upi|bank|unauthori|transaction|cyber/.test(text)) {
    refs.push("Cyber financial fraud: call 1930 quickly and file at cybercrime.gov.in.");
  }
  if (/refund|replacement|defect|seller|shop|consumer|delivery/.test(text)) {
    refs.push("Consumer grievance: National Consumer Helpline 1915, WhatsApp +91 8800001915, consumerhelpline.gov.in.");
  }
  if (/terminat|fired|dismiss|severance|salary|wages|notice period|workplace/.test(text)) {
    refs.push("Employment/labour dispute: use the Ministry of Labour SAMADHAN portal or contact the local labour commissioner/labour office.");
  }

  if (!refs.length) return "";
  return section("Official references", refs);
}
function renderDebate(d) {
  if (Array.isArray(d.debate_rounds) && d.debate_rounds.length) {
    return '<div class="debate">' + d.debate_rounds.map(round => {
      const turns = Array.isArray(round.turns) ? round.turns : [];
      return '<article class="debate__round">' +
        '<div class="debate__round-title">Round ' + esc(round.round_number ?? "") + '</div>' +
        turns.map(turn =>
          '<div class="debate__turn">' +
            '<div class="debate__agent">' + esc(turn.agent_name ?? turn.agent_key ?? "Agent") +
            (turn.role ? '<span class="debate__role">' + esc(turn.role) + '</span>' : "") +
            '</div>' +
            renderTextBlock(turn.response ?? "") +
          '</div>'
        ).join("") +
      '</article>';
    }).join("") + "</div>";
  }

  if (d.debate_transcript) return renderTextBlock(d.debate_transcript);
  return "";
}
function debateSection(d) {
  const inner = renderDebate(d);
  if (!inner) return "";
  return '<div class="ruling__section"><h4>Agent debate</h4>' + inner + "</div>";
}

function showResults(d, transcriptFallback) {
  const transcript = d.transcript ?? d.text ?? transcriptFallback ?? "";
  // Transcript + raw payload stay in the console, per design.
  console.groupCollapsed("%c[BharatLex] result", STYLE);
  clog("transcript: " + (transcript || "(none)"));
  if (d.language_code || d.detected_language) clog("language: " + (d.language_code ?? d.detected_language));
  console.log(d);
  console.groupEnd();

  const category = d.category?.label ?? d.category?.key ?? d.category ?? "";
  if (typeof d.category === "object") d.category = category;
  let html = "";
  if (d.category) html += '<p class="ruling__eyebrow">Analysis · ' + esc(d.category) + "</p>";
  else            html += '<p class="ruling__eyebrow">Analysis</p>';
  html += inputSection(d, transcript);
  html += section("Conclusion", d.final_answer);
  html += section("Uploaded evidence", d.input_source?.evidence_match);
  html += draftRecommendation(d);
  html += makeDraftDocument(d);
  html += officialReferences(d);
  html += debateSection(d);
  if (!d.final_answer) {
    html += section("Status", d.final_error || d.message || "No final conclusion was returned. Check backend logs or retry the request.");
  }

  const ruling = $("ruling");
  ruling.className = "ruling reveal";
  ruling.innerHTML = html;
  $("output").scrollIntoView({ behavior: "smooth", block: "center" });
}

function clearOutput() {
  const ruling = $("ruling");
  ruling.className = "ruling is-empty";
  ruling.textContent = "No analysis yet. Capture audio or upload a document, then press Analyze.";
}
function copyDraft() {
  const draft = $("draftText");
  if (!draft) return;
  draft.select();
  navigator.clipboard?.writeText(draft.value);
  setStatus("Draft copied", "ok");
}
function downloadDraft() {
  const draft = $("draftText");
  if (!draft) return;
  const blob = new Blob([draft.value], { type: "text/plain;charset=utf-8" });
  const url = URL.createObjectURL(blob);
  const link = document.createElement("a");
  link.href = url;
  link.download = "bharatlex-draft.txt";
  document.body.appendChild(link);
  link.click();
  link.remove();
  URL.revokeObjectURL(url);
  setStatus("Draft downloaded", "ok");
}

// ─── OGG conversion (audio path) ──────────────────────────────────────────────
async function convertToOGG(blob) {
  clog("input: " + blob.type + " (" + blob.size + " bytes)");
  const header = await blob.slice(0, 4).arrayBuffer();
  const magic = Array.from(new Uint8Array(header)).map(b => b.toString(16).padStart(2, "0")).join(" ");
  clog("container magic: " + magic);
  if (magic === "4f 67 67 53") { clog("already OGG — pass through"); return new Blob([await blob.arrayBuffer()], { type: "audio/ogg" }); }
  if (magic === "1a 45 df a3") { clog("WebM — relabel as audio/ogg (Opus payload unchanged)", "warn"); return new Blob([await blob.arrayBuffer()], { type: "audio/ogg" }); }
  clog("unknown magic — relabel as audio/ogg anyway", "warn");
  return new Blob([await blob.arrayBuffer()], { type: "audio/ogg" });
}

// ─── Start / Stop (one-shot recording) ────────────────────────────────────────
$("recordBtn").onclick = () => (isRecording ? stopRecording() : startRecording());

async function startRecording() {
  chunks = [];
  stage("mic", "active");
  try {
    micStream = await navigator.mediaDevices.getUserMedia({
      audio: { channelCount: 1, sampleRate: { ideal: 16000 },
               echoCancellation: true, noiseSuppression: true, autoGainControl: true }
    });
    const track = micStream.getAudioTracks()[0];
    clog("mic granted: " + track.label);

    const types = ["audio/webm;codecs=opus","audio/webm","audio/ogg;codecs=opus","audio/ogg"];
    const mimeType = types.find(t => MediaRecorder.isTypeSupported(t)) || "";
    clog("mimeType: " + (mimeType || "(default)"));

    recorder = new MediaRecorder(micStream, mimeType ? { mimeType } : {});
    recorder.ondataavailable = e => { if (e.data && e.data.size > 0) chunks.push(e.data); };
    recorder.start(200);

    recSeconds = 0;
    timerInterval = setInterval(() => {
      recSeconds++;
      const m = String(Math.floor(recSeconds/60)).padStart(1,"0");
      const s = String(recSeconds%60).padStart(2,"0");
      setStatus("Recording " + m + ":" + s, "live");
    }, 1000);

    isRecording = true;
    setStatus("Recording 0:00", "live");
    $("recordBtn").textContent = "Stop recording";
    $("recordBtn").classList.add("is-live");
    $("submitBtn").disabled = true;
    $("uploadBtn").disabled = true;
    stage("mic", "done");
  } catch (err) {
    stage("mic", "error");
    setError("Mic error — " + err.name);
  }
}

async function stopRecording() {
  clearInterval(timerInterval);
  setStatus("Finishing…", "busy");
  await new Promise(res => { recorder.onstop = res; recorder.stop(); });
  micStream.getTracks().forEach(t => t.stop());

  rawBlob = new Blob(chunks, { type: recorder.mimeType || "audio/webm" });
  clog("raw blob: " + rawBlob.type + ", " + rawBlob.size + " bytes");

  isRecording = false; recordingUsed = true;
  $("recordBtn").classList.remove("is-live");
  $("recordBtn").textContent = "Recorded";
  $("recordBtn").disabled = true;       // one-shot: no restart until Clear
  $("uploadBtn").disabled = false;

  if (rawBlob.size < 1000) { stage("blob","error"); setError("Recording too short — press Clear and retry"); return; }
  stage("blob", "done");

  activeInput = "audio";
  capturedInput = { label: "Speech recording", text: "Audio captured. Press Analyze to transcribe and run legal analysis." };
  showWorking("Audio captured", capturedInput.text);
  setStatus("Ready to analyze · audio", "ok");
  updateSubmitState();
}

// ─── Upload → OCR ─────────────────────────────────────────────────────────────
$("uploadBtn").onclick = () => $("fileInput").click();

$("fileInput").onchange = async () => {
  const file = $("fileInput").files[0];
  if (!file) return;
  clog("file: " + file.name + " (" + file.type + ", " + file.size + " bytes)");
  stage("file", "done");
  stage("ocr", "active");
  setStatus("Document uploaded. Extracting text...", "busy");
  showWorking("Reading document", "Uploaded: " + file.name + "\nExtracting readable text...");
  $("submitBtn").disabled = true;

  if (file.type === "text/plain" || file.name.toLowerCase().endsWith(".txt")) {
    try {
      ocrText = await file.text();
    } catch {
      stage("ocr","error");
      setError("Could not read text file");
      return;
    }
    if (!ocrText.trim()) { stage("ocr","error"); setError("Text file is empty"); return; }
    capturedInput = { label: "Uploaded text", text: ocrText };
    activeInput = "file";
    stage("ocr", "done");
    setStatus("Text captured. Ready to analyze.", "ok");
    showWorking("Text captured", ocrText);
    updateSubmitState();
    return;
  }

  if (!file.type.startsWith("image/")) {
    stage("ocr","error");
    setError("Upload an image screenshot or .txt file");
    showWorking("Unsupported document", "For this demo, upload a screenshot/image for OCR or a .txt file. PDF OCR is not wired yet.");
    return;
  }

  const fd = new FormData();
  fd.append("file", file, file.name);

  let res, text;
  try {
    res = await fetch(OCR_URL, { method: "POST", body: fd });
    text = await res.text();
    clog("OCR HTTP " + res.status + " — " + text.slice(0, 400), res.ok ? "info" : "error");
  } catch (err) { stage("ocr","error"); setError("OCR unreachable — is " + OCR_URL + " running?"); return; }

  if (!res.ok) { stage("ocr","error"); setError("OCR failed (" + res.status + ")"); return; }

  let parsed; try { parsed = JSON.parse(text); }
  catch { stage("ocr","error"); setError("OCR returned non-JSON"); return; }

  const od = parsed.data ?? parsed;
  ocrText = od.text ?? od.transcript ?? od.ocr_text ?? "";
  if (!ocrText.trim()) { stage("ocr","error"); setError("OCR returned empty text"); return; }

  stage("ocr", "done");
  clog("OCR text (" + ocrText.length + " chars):\n" + ocrText);

  capturedInput = { label: "OCR extracted text", text: ocrText };
  showWorking("OCR complete", ocrText);
  activeInput = "file";
  setStatus("Ready to analyze · document", "ok");
  updateSubmitState();
};

// ─── Analyze ──────────────────────────────────────────────────────────────────
$("submitBtn").onclick = async () => {
  $("submitBtn").disabled = true;
  if (activeInput === "audio") await submitAudio();
  else if (activeInput === "file") await submitText();
  else setError("Nothing to analyze yet");
};

async function submitAudio() {
  setStatus("Preparing audio…", "busy");
  let ogg;
  try { ogg = await convertToOGG(rawBlob); stage("ogg","done"); }
  catch (err) { stage("ogg","error"); setError("Audio prep failed"); updateSubmitState(); return; }

  setStatus("Analyzing…", "busy");
  showWorking("Analyzing speech", capturedInput?.text || "Transcribing the recording, then running legal analysis...");
  stage("upload", "active");
  const fd = new FormData();
  fd.append("file", ogg, "recording.ogg");

  let res, text;
  try { res = await fetch(ANALYZE_AUDIO_URL, { method:"POST", body: fd }); text = await res.text();
        clog("HTTP " + res.status + " — " + text.slice(0,400), res.ok?"info":"error"); }
  catch (err) { stage("upload","error"); setError("Backend unreachable — check CORS"); updateSubmitState(); return; }

  if (!res.ok) { stage("upload","error"); setError("Backend " + res.status); updateSubmitState(); return; }
  stage("upload","done");

  let data; try { data = JSON.parse(text); }
  catch { stage("stt","error"); setError("Response not JSON"); updateSubmitState(); return; }

  const payload = data.data ?? data;
  const transcript = payload.input_source?.transcript || payload.transcript;
  if (transcript) capturedInput = { label: "Speech transcript", text: transcript };
  showResults(payload);
  stage("stt","done");
  setStatus("Complete", "ok");
}

async function submitText() {
  setStatus("Analyzing…", "busy");
  showWorking("Analyzing captured text", ocrText);
  stage("analyze", "active");
  let res, text;
  try {
    res = await fetch(ANALYZE_TEXT_URL, {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        question: ocrText,
        include_final: true,
        debug: false,
        save_conversation: false
      })
    });
    text = await res.text();
    clog("HTTP " + res.status + " — " + text.slice(0,400), res.ok?"info":"error");
  } catch (err) { stage("analyze","error"); setError("Backend unreachable — check " + ANALYZE_TEXT_URL); updateSubmitState(); return; }

  if (!res.ok) { stage("analyze","error"); setError("Backend " + res.status); updateSubmitState(); return; }

  let data; try { data = JSON.parse(text); }
  catch { stage("analyze","error"); setError("Response not JSON"); updateSubmitState(); return; }

  showResults(data.data ?? data, ocrText);
  stage("analyze","done");
  setStatus("Complete", "ok");
}

// ─── Clear ────────────────────────────────────────────────────────────────────
$("resetBtn").onclick = () => {
  if (recorder && recorder.state === "recording") {
    recorder.stop();
    if (micStream) micStream.getTracks().forEach(t => t.stop());
  }
  clearInterval(timerInterval);
  recSeconds = 0; chunks = [];
  rawBlob = null; ocrText = null; activeInput = null; capturedInput = null;
  isRecording = false; recordingUsed = false;

  $("recordBtn").disabled = false;
  $("recordBtn").classList.remove("is-live");
  $("recordBtn").textContent = "Start recording";
  $("uploadBtn").disabled = false;
  $("submitBtn").disabled = true;
  $("fileInput").value = "";

  clearOutput();
  setStatus("Idle", "idle");
  console.clear();
  clog("cleared");
};
</script>
